<!DOCTYPE html>
<html lang="en">
<head>
   
    <title>Scholarship Form</title>
</head>
<body>

    <h1 align="center">Scholarship Application Form</h1>
    
    <form action="#" method="post">
        
        <!-- Name -->
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required><br><br>

        <!-- Phone Number -->
        <label for="phno">Phone Number:</label>
        <input type="text" id="phno" name="phno" required><br><br>

        <!-- Gender -->
        <label>Gender:</label><br>
        <input type="radio" id="male" name="gender" value="Male">
        <label for="male">Male</label><br>
        <input type="radio" id="female" name="gender" value="Female">
        <label for="female">Female</label><br>
        <input type="radio" id="other" name="gender" value="Other">
        <label for="other">Other</label><br><br>

        <!-- Age -->
        <label for="age">Age:</label>
        <input type="number" id="age" name="age" required><br><br>

        <!-- 10th Marks -->
        <label for="marks10">10th Marks (%):</label>
        <input type="number" id="marks10" name="marks10" required><br><br>

        <!-- 11th Marks -->
        <label for="marks11">11th Marks (%):</label>
        <input type="number" id="marks11" name="marks11" required><br><br>

        <!-- 12th Marks -->
        <label for="marks12">12th Marks (%):</label>
        <input type="number" id="marks12" name="marks12" required><br><br>

        <!-- Annual Income -->
        <label for="income">Annual Income (in INR):</label>
        <input type="number" id="income" name="income" required><br><br>

        <!-- Submit Button -->
        <input type="submit" value="Submit">
        
    </form>

</body>
</html>
